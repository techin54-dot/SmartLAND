<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#02070d" />
  <title>SmartLAND</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    :root{
      --app-height:100dvh;
      --app-width:100vw;
      --green:#39f2a2;
      --cyan:#4cc9ff;
      --yellow:#ffb703;
      --blue:#1f78b8;
      --dark:#06111f;
      --line:rgba(255,255,255,.16);
    }

    *{box-sizing:border-box}

    html,
    body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      min-height:100%;
      overflow:hidden;
      background:#02070d;
      color:#fff;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      overscroll-behavior:none;
      touch-action:manipulation;
    }

    body{
      position:fixed;
      inset:0;
    }

    .app{
      position:fixed;
      left:0;
      top:0;
      width:var(--app-width);
      height:var(--app-height);
      min-height:100svh;
      max-height:100dvh;
      overflow:hidden;
      background:#02070d;
    }

    #map{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:1;
      background:#111;
    }

    .tech-vignette{
      position:absolute;
      inset:0;
      z-index:2;
      pointer-events:none;
      background:linear-gradient(to bottom,rgba(0,0,0,.14),transparent 36%,rgba(0,0,0,.18));
    }

    .target-crosshair{
      position:absolute;
      left:50%;
      top:50%;
      width:74px;
      height:74px;
      transform:translate(-50%,-50%);
      z-index:650;
      pointer-events:none;
      filter:drop-shadow(0 0 8px rgba(0,0,0,.75));
    }

    .target-circle{
      position:absolute;
      inset:12px;
      border-radius:50%;
      border:4px solid var(--yellow);
      box-shadow:0 0 0 2px rgba(0,0,0,.55);
    }

    .target-tick{
      position:absolute;
      background:#fff;
      border-radius:999px;
      box-shadow:0 0 0 2px rgba(0,0,0,.55);
    }

    .target-tick.top{
      width:4px;
      height:14px;
      left:50%;
      top:2px;
      transform:translateX(-50%);
    }

    .target-tick.bottom{
      width:4px;
      height:14px;
      left:50%;
      bottom:2px;
      transform:translateX(-50%);
    }

    .target-tick.left{
      width:14px;
      height:4px;
      left:2px;
      top:50%;
      transform:translateY(-50%);
    }

    .target-tick.right{
      width:14px;
      height:4px;
      right:2px;
      top:50%;
      transform:translateY(-50%);
    }

    .target-dot{
      position:absolute;
      width:7px;
      height:7px;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:var(--yellow);
      box-shadow:0 0 0 3px rgba(0,0,0,.65);
    }

    .center-coordinate-popup{
      position:absolute;
      left:50%;
      top:calc(50% - 78px);
      transform:translateX(-50%);
      z-index:770;
      min-width:230px;
      max-width:min(88vw,380px);
      padding:11px 38px 11px 14px;
      border-radius:16px;
      background:rgba(5,12,22,.88);
      border:1px solid rgba(255,255,255,.22);
      color:#fff;
      font-size:13px;
      font-weight:900;
      line-height:1.45;
      text-align:center;
      box-shadow:0 14px 30px rgba(0,0,0,.38);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    .center-coordinate-popup::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:-8px;
      width:14px;
      height:14px;
      transform:translateX(-50%) rotate(45deg);
      background:rgba(5,12,22,.88);
      border-right:1px solid rgba(255,255,255,.18);
      border-bottom:1px solid rgba(255,255,255,.18);
    }

    .popup-close{
      position:absolute;
      right:8px;
      top:7px;
      width:25px;
      height:25px;
      border:0;
      border-radius:50%;
      display:grid;
      place-items:center;
      padding:0;
      background:rgba(255,255,255,.12);
      color:#fff;
      font-size:18px;
      line-height:1;
      box-shadow:none;
    }

    .top-panel{
      position:absolute;
      top:calc(10px + env(safe-area-inset-top));
      left:10px;
      right:10px;
      z-index:700;
      display:flex;
      gap:10px;
      align-items:flex-start;
      pointer-events:none;
    }

    .brand-card{
      min-width:128px;
      height:54px;
      padding:7px 12px;
      border-radius:999px;
      background:rgba(5,12,22,.76);
      border:1px solid var(--line);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      box-shadow:0 12px 28px rgba(0,0,0,.35);
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:auto;
    }

    .brand-logo{
      width:100%;
      max-width:150px;
      height:38px;
      object-fit:contain;
      display:none;
    }

    .brand-text{
      font-size:19px;
      font-weight:900;
      background:linear-gradient(135deg,var(--green),var(--cyan));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .info-card{
      flex:1;
      max-width:520px;
      padding:12px;
      border-radius:22px;
      background:rgba(5,12,22,.78);
      border:1px solid var(--line);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      box-shadow:0 12px 28px rgba(0,0,0,.35);
      pointer-events:auto;
    }

    .info-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin-bottom:7px;
    }

    .info-title{
      font-size:14px;
      font-weight:900;
      color:#e8fbff;
    }

    .icon-close-btn{
      width:30px;
      height:30px;
      padding:0!important;
      border-radius:50%!important;
      display:grid;
      place-items:center;
      font-size:22px!important;
      line-height:1;
      font-weight:900;
      color:#ffffff!important;
      background:rgba(255,255,255,.14)!important;
      border:1px solid rgba(255,255,255,.18)!important;
      box-shadow:none!important;
    }

    .info-grid{
      display:grid;
      gap:5px;
      font-size:12px;
      line-height:1.45;
      color:#f8fafc;
    }

    .thai-area{
      font-size:15px;
      font-weight:900;
      color:#dffcef;
    }

    .current-location-box{
      margin-top:8px;
      padding:8px 10px;
      border-radius:14px;
      background:rgba(4,12,22,.62);
      border:1px solid rgba(76,201,255,.24);
      color:#e8fbff;
      font-size:12px;
      line-height:1.45;
    }

    .danger-mini-btn{
      margin-top:8px;
      width:100%;
      padding:8px 10px;
      border-radius:14px;
      font-size:12px;
      background:linear-gradient(135deg,rgba(190,18,60,.78),rgba(255,77,109,.54));
      color:#fff;
    }

    .show-info-btn{
      position:absolute;
      top:calc(76px + env(safe-area-inset-top));
      left:10px;
      z-index:740;
      padding:10px 13px;
      border-radius:999px;
      color:#04120c;
      font-size:13px;
      font-weight:900;
      background:linear-gradient(135deg,var(--green),var(--cyan));
      border:1px solid rgba(255,255,255,.25);
      box-shadow:0 12px 30px rgba(0,0,0,.35);
    }

    .note-panel{
      position:absolute;
      left:10px;
      right:10px;
      bottom:calc(104px + env(safe-area-inset-bottom));
      z-index:710;
      max-width:520px;
      margin:0 auto;
      padding:12px;
      border-radius:22px;
      background:rgba(5,12,22,.82);
      border:1px solid var(--line);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      box-shadow:0 12px 28px rgba(0,0,0,.35);
    }

    .note-panel-title{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      font-size:13px;
      font-weight:900;
      color:#dffaff;
      margin-bottom:8px;
    }

    label{
      display:block;
      font-size:12px;
      font-weight:900;
      color:#dffcef;
      margin-bottom:5px;
    }

    input,textarea{
      width:100%;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.10);
      color:#fff;
      border-radius:15px;
      padding:10px 12px;
      font-size:14px;
      outline:none;
    }

    input{margin-bottom:8px}

    textarea{
      min-height:62px;
      max-height:100px;
      resize:vertical;
    }

    input::placeholder,
    textarea::placeholder{
      color:rgba(255,255,255,.55);
    }

    button{
      cursor:pointer;
      border:1px solid rgba(255,255,255,.16);
      color:#fff;
      border-radius:16px;
      font-weight:900;
      box-shadow:0 10px 24px rgba(0,0,0,.25);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    button:active{
      transform:scale(.96);
    }

    button:disabled{
      opacity:.55;
      pointer-events:none;
    }

    .control-pad{
      position:absolute;
      left:50%;
      bottom:calc(14px + env(safe-area-inset-bottom));
      transform:translateX(-50%);
      z-index:720;
      width:238px;
      height:78px;
      display:grid;
      grid-template-columns:58px 78px 58px;
      gap:22px;
      align-items:center;
      justify-content:center;
      background:transparent;
      border:0;
      box-shadow:none;
      pointer-events:none;
    }

    .control-side-btn,
    .control-main-btn{
      pointer-events:auto;
      position:relative;
      display:grid;
      place-items:center;
      padding:0;
      border:1px solid rgba(255,255,255,.82);
      color:#ffffff;
      background:rgba(235,247,255,.92);
      box-shadow:0 10px 22px rgba(0,0,0,.32);
      overflow:hidden;
    }

    .control-side-btn{
      width:58px;
      height:52px;
      border-radius:18px;
    }

    .control-main-btn{
      width:78px;
      height:78px;
      border-radius:50%;
      background:linear-gradient(180deg,#79c9ff 0%,#1e88dc 100%);
      border:3px solid rgba(255,255,255,.92);
      box-shadow:0 12px 26px rgba(0,0,0,.35);
    }

    .control-svg{
      width:28px;
      height:28px;
      fill:#23658f;
    }

    .control-main-svg{
      width:40px;
      height:40px;
      fill:#ffffff;
    }

    .float-icon-btn{
      position:absolute;
      z-index:760;
      width:56px;
      height:56px;
      border-radius:50%;
      display:grid;
      place-items:center;
      padding:0;
      border:1px solid rgba(255,255,255,.88);
      background:rgba(245,250,255,.94);
      box-shadow:0 10px 22px rgba(0,0,0,.32);
    }

    .flat-svg{
      width:29px;
      height:29px;
      display:block;
    }

    .float-coord-mode{
      right:14px;
      bottom:calc(334px + env(safe-area-inset-bottom));
    }

    .float-coord-mode .flat-svg{
      fill:#7c3aed;
    }

    .float-center-coord{
      right:14px;
      bottom:calc(262px + env(safe-area-inset-bottom));
    }

    .float-center-coord .flat-svg{
      fill:#f59e0b;
    }

    .float-location{
      right:14px;
      bottom:calc(190px + env(safe-area-inset-bottom));
    }

    .float-location .flat-svg{
      fill:#1f78b8;
    }

    .float-save{
      right:14px;
      bottom:calc(118px + env(safe-area-inset-bottom));
    }

    .float-save .flat-svg{
      fill:#12835d;
    }

    .coord-badge{
      position:absolute;
      right:8px;
      bottom:5px;
      min-width:28px;
      padding:2px 5px;
      border-radius:999px;
      background:#7c3aed;
      color:#fff;
      font-size:9px;
      font-weight:900;
      line-height:1;
      border:1px solid rgba(255,255,255,.8);
    }

    .point-marker{
      width:28px;
      height:28px;
      border-radius:50%;
      display:grid;
      place-items:center;
      color:#04120c;
      font-size:13px;
      font-weight:900;
      background:linear-gradient(135deg,var(--green),var(--cyan));
      border:2px solid #fff;
      box-shadow:0 4px 14px rgba(0,0,0,.45);
    }

    .my-location-pulse{
      width:22px;
      height:22px;
      border-radius:50%;
      background:#1da1ff;
      border:4px solid #ffffff;
      box-shadow:
        0 0 0 0 rgba(29,161,255,.65),
        0 0 14px rgba(29,161,255,.80);
      animation:locationPulse 1.45s ease-out infinite;
    }

    @keyframes locationPulse{
      0%{
        box-shadow:
          0 0 0 0 rgba(29,161,255,.65),
          0 0 14px rgba(29,161,255,.80);
      }
      70%{
        box-shadow:
          0 0 0 16px rgba(29,161,255,0),
          0 0 18px rgba(29,161,255,.55);
      }
      100%{
        box-shadow:
          0 0 0 0 rgba(29,161,255,0),
          0 0 14px rgba(29,161,255,.80);
      }
    }

    .toast{
      position:absolute;
      left:50%;
      bottom:calc(124px + env(safe-area-inset-bottom));
      transform:translateX(-50%) translateY(18px);
      z-index:950;
      min-width:min(92vw,360px);
      padding:12px 14px;
      border-radius:18px;
      background:linear-gradient(135deg,rgba(5,18,16,.94),rgba(8,30,45,.92));
      border:1px solid rgba(57,242,162,.35);
      box-shadow:0 16px 42px rgba(0,0,0,.46);
      color:#fff;
      opacity:0;
      pointer-events:none;
      transition:.28s ease;
      font-size:13px;
      font-weight:900;
      text-align:center;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .preview-modal,
    .browser-gate{
      position:fixed;
      inset:0;
      z-index:1200;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
      background:rgba(0,0,0,.84);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    .browser-gate{
      z-index:2000;
    }

    .preview-modal.hide,
    .browser-gate.hide{
      display:none;
    }

    .preview-card,
    .browser-card{
      width:100%;
      max-width:440px;
      max-height:92vh;
      overflow:auto;
      padding:16px;
      border-radius:24px;
      background:linear-gradient(180deg,rgba(10,22,38,.98),rgba(6,12,22,.96));
      border:1px solid rgba(255,255,255,.16);
      box-shadow:0 18px 48px rgba(0,0,0,.55);
      text-align:center;
    }

    .browser-icon{
      width:70px;
      height:70px;
      margin:0 auto 12px;
      border-radius:22px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,#39f2a2,#4cc9ff);
      color:#04120c;
      font-size:34px;
      font-weight:900;
    }

    .browser-title{
      font-size:22px;
      font-weight:900;
      margin-bottom:8px;
      color:#ffffff;
    }

    .browser-desc{
      font-size:14px;
      line-height:1.7;
      color:rgba(255,255,255,.82);
      margin-bottom:14px;
    }

    .browser-warning{
      padding:10px 12px;
      border-radius:16px;
      background:rgba(245,158,11,.12);
      border:1px solid rgba(245,158,11,.35);
      color:#fde68a;
      font-size:13px;
      line-height:1.55;
      margin-bottom:12px;
    }

    .browser-actions{
      display:grid;
      gap:10px;
    }

    .browser-actions button{
      width:100%;
      min-height:50px;
      border-radius:16px;
      padding:12px;
      font-size:15px;
      font-weight:900;
    }

    .primary-action{
      background:linear-gradient(135deg,#16a34a,#22c55e);
    }

    .secondary-action{
      background:rgba(255,255,255,.12);
    }

    .danger-action{
      background:linear-gradient(135deg,#7f1d1d,#be123c);
    }

    .preview-title{
      font-size:18px;
      font-weight:900;
      margin-bottom:6px;
    }

    .preview-note{
      font-size:13px;
      line-height:1.6;
      color:rgba(255,255,255,.78);
      margin-bottom:12px;
    }

    .preview-image-wrap{
      position:relative;
      width:100%;
      border-radius:16px;
      overflow:hidden;
      background:#000;
      border:1px solid rgba(255,255,255,.16);
    }

    .preview-image{
      width:100%;
      max-height:58vh;
      object-fit:contain;
      display:block;
      background:#000;
      -webkit-touch-callout:default;
      user-select:auto;
    }

    .tap-save-overlay{
      position:absolute;
      left:50%;
      bottom:14px;
      transform:translateX(-50%);
      z-index:2;
      padding:9px 14px;
      border-radius:999px;
      background:rgba(0,0,0,.68);
      color:#fff;
      font-size:14px;
      font-weight:900;
      white-space:nowrap;
      border:1px solid rgba(255,255,255,.25);
      display:none;
    }

    .preview-actions{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-top:12px;
    }

    .preview-actions button{
      width:100%;
      height:auto;
      min-height:52px;
      border-radius:16px;
      padding:12px;
      font-size:15px;
      background:linear-gradient(180deg,rgba(24,34,52,.94),rgba(10,16,28,.94));
    }

    .preview-hint{
      margin-top:10px;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(57,242,162,.10);
      border:1px solid rgba(57,242,162,.22);
      color:#dffcef;
      font-size:12px;
      line-height:1.55;
    }

    .hide{
      display:none!important;
    }

    @media (max-width:520px){
      .top-panel{
        flex-direction:column;
        right:auto;
        width:min(94vw,390px);
      }

      .info-card{
        width:100%;
      }

      .note-panel{
        bottom:calc(112px + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div id="map"></div>
    <div class="tech-vignette"></div>

    <div class="target-crosshair">
      <div class="target-circle"></div>
      <div class="target-tick top"></div>
      <div class="target-tick right"></div>
      <div class="target-tick bottom"></div>
      <div class="target-tick left"></div>
      <div class="target-dot"></div>
    </div>

    <div id="centerCoordinatePopup" class="center-coordinate-popup hide">
      <button class="popup-close" onclick="hideCenterCoordinatePopup()">×</button>
      <div id="centerCoordinatePopupText">-</div>
    </div>

    <div class="top-panel">
      <div class="brand-card">
        <img id="brandLogo" class="brand-logo" alt="SmartLAND Logo">
        <div id="brandText" class="brand-text">SmartLAND</div>
      </div>

      <div id="infoCard" class="info-card">
        <div class="info-header">
          <div class="info-title">ข้อมูลพื้นที่แปลง</div>
          <button class="icon-close-btn" onclick="hideInfoPanel()" title="ปิดหน้าต่างข้อมูล">×</button>
        </div>

        <div class="info-grid">
          <div id="infoPlotName">ชื่อ: -</div>
          <div id="infoPlotDetail">รายละเอียด: -</div>
          <div id="thaiAreaText" class="thai-area">ขนาดพื้นที่: -</div>
        </div>

        <div id="currentLocationBox" class="current-location-box">
          พิกัดจุดศูนย์กลางเป้าเล็ง: -
        </div>

        <button class="danger-mini-btn" onclick="clearAllPoints()">ล้างจุดทั้งหมด</button>
      </div>
    </div>

    <button id="showInfoButton" class="show-info-btn hide" onclick="showInfoPanel()">
      ขนาดพื้นที่: <span id="floatingAreaText">-</span>
    </button>

    <div id="notePanel" class="note-panel hide">
      <div class="note-panel-title">
        <span>บันทึกข้อมูลแปลง</span>
        <button class="icon-close-btn" onclick="toggleNotePanel()" title="ปิดหน้าต่างบันทึกข้อมูล">×</button>
      </div>

      <label for="plotName">ชื่อ</label>
      <input id="plotName" type="text" placeholder="เช่น แปลงสาธิต / ชื่อเกษตรกร / จุดสำรวจ">

      <label for="plotDetail">รายละเอียด</label>
      <textarea id="plotDetail" placeholder="เช่น ชนิดพืช สถานที่ หมายเหตุ หรือรายละเอียดเพิ่มเติม"></textarea>
    </div>

    <button class="float-icon-btn float-coord-mode" onclick="toggleCoordinateMode(
